name: Build Nexus App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android@8.3.0

      - name: Create or Sync Android Project
        run: |
          # حذف پوشه اندروید اگر از قبل وجود داشت برای اطمینان از سلامت بیلد
          rm -rf android
          # ایجاد مجدد پروژه اندروید
          npx cap add android
          # کپی کردن فایل‌های وب به پروژه
          npx cap copy android
          
      - name: Generate Gradle Wrapper
        run: |
          # این بخش فایل gradlew را که مفقود شده بود تولید می‌کند
          cd android
          gradle wrapper

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Release-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
