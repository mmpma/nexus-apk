name: Build Nexus Ultimate APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/android@8.3.0

      - name: Create or Sync Android Project
        run: |
          if [ -d "android" ]; then rm -rf android; fi
          npx cap add android
          npx cap sync android

      # ۱. تنظیم آیکون اختصاصی و حذف وکتورها
      - name: Set Custom Icon
        run: |
          for dir in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$dir
            cp www/logo.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
            cp www/logo.png android/app/src/main/res/mipmap-$dir/ic_launcher_round.png
          done
          find android/app/src/main/res -name "ic_launcher.xml" -delete
          find android/app/src/main/res -name "ic_launcher_round.xml" -delete
          find android/app/src/main/res -name "ic_launcher_background.xml" -delete
          find android/app/src/main/res -name "ic_launcher_foreground.xml" -delete
          rm -rf android/app/src/main/res/mipmap-anydpi-v26

      # ۲. اضافه کردن تمامی پرمیشن‌ها (دوربین، صدا، حافظه، تصاویر)
      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          PERMS='<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />'
          sed -i "s|<uses-permission android:name=\"android.permission.INTERNET\" />|$PERMS|" "$MANIFEST"

      # ۳. اصلاح MainActivity (لینک‌های خارجی، خروج، کلیپ‌بورد)
      - name: Patch MainActivity
        run: |
          MAIN=$(find android -name "MainActivity.java" | head -1)
          PKG_LINE=$(grep "^package" "$MAIN" | head -1)
          
          cat > "$MAIN" << JAVAEOF
          ${PKG_LINE}

          import android.os.Bundle;
          import android.content.Intent;
          import android.net.Uri;
          import android.view.WindowManager;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebView;
          import android.webkit.JavascriptInterface;
          import android.content.ClipboardManager;
          import android.content.ClipData;
          import android.content.Context;
          import android.util.Base64;
          import android.graphics.Bitmap;
          import java.io.ByteArrayOutputStream;
          import com.getcapacitor.BridgeActivity;
          import com.getcapacitor.BridgeWebViewClient;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // امنیت: قفل اسکرین‌شات
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_SECURE, WindowManager.LayoutParams.FLAG_SECURE);

                  WebView webView = getBridge().getWebView();
                  webView.addJavascriptInterface(new ClipboardInterface(), "NativeClipboard");

                  // مدیریت لینک‌های خارجی و فرمت‌های فایل
                  webView.setWebViewClient(new BridgeWebViewClient(getBridge()) {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          String url = request.getUrl().toString();
                          String host = request.getUrl().getHost();

                          // باز کردن تمام لینک‌های خارج از دامین سایت در مرورگر
                          if (host != null && !host.contains("noxhub.ir")) {
                              startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url)));
                              return true;
                          }

                          // باز کردن فرمت‌های دانلودی در مرورگر
                          String lowUrl = url.toLowerCase();
                          if (lowUrl.endsWith(".zip") || lowUrl.endsWith(".rar") || lowUrl.endsWith(".pdf") || 
                              lowUrl.endsWith(".apk") || lowUrl.endsWith(".mp4") || lowUrl.endsWith(".mp3") ||
                              lowUrl.contains("download")) {
                              startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url)));
                              return true;
                          }
                          return super.shouldOverrideUrlLoading(view, request);
                      }
                  });
              }

              public class ClipboardInterface {
                  @JavascriptInterface
                  public String getClipboardImage() {
                      try {
                          ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                          if (clipboard.hasPrimaryClip()) {
                              ClipData clip = clipboard.getPrimaryClip();
                              if (clip != null && clip.getItemCount() > 0) {
                                  Uri imageUri = clip.getItemAt(0).getUri();
                                  if (imageUri != null) {
                                      Bitmap bitmap = android.provider.MediaStore.Images.Media.getBitmap(getContentResolver(), imageUri);
                                      ByteArrayOutputStream out = new ByteArrayOutputStream();
                                      bitmap.compress(Bitmap.CompressFormat.PNG, 100, out);
                                      return "data:image/png;base64," + Base64.encodeToString(out.toByteArray(), Base64.DEFAULT);
                                  }
                              }
                          }
                      } catch (Exception e) { return ""; }
                      return "";
                  }

                  @JavascriptInterface
                  public void exitApp() { finish(); }
              }
          }
          JAVAEOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Ultimate-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
