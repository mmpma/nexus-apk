name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Download and set logo
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          curl -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png \
            https://nexus.noxhub.ir/assets/img/logo.png
          curl -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png \
            https://nexus.noxhub.ir/assets/img/logo.png

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
