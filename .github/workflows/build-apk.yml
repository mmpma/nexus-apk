name: Build Nexus App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Create or Sync Android Project
        run: |
          # اگر پوشه اندروید نیست، آن را بساز
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          # همگام‌سازی فایل‌های وب و تنظیمات
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          # اطمینان از وجود فایل و دادن دسترسی
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Error: gradlew not found!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Release-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
