name: Build Nexus Ultimate APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin


      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/core@8.3.0
          npm install @capacitor/android@8.3.0


      - name: Create Android Project
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android


      - name: Apply App Icon
        run: |
          for dir in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$dir
            cp www/logo.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
            cp www/logo.png android/app/src/main/res/mipmap-$dir/ic_launcher_round.png
          done

          rm -rf android/app/src/main/res/mipmap-anydpi-v26 || true


      - name: Patch AndroidManifest Permissions
        run: |

          MANIFEST=android/app/src/main/AndroidManifest.xml

          sed -i '/<application/i\
          <uses-permission android:name="android.permission.INTERNET"/>' $MANIFEST

          sed -i '/<application/i\
          <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>' $MANIFEST

          sed -i '/<application/i\
          <uses-permission android:name="android.permission.READ_MEDIA_VISUAL_USER_SELECTED"/>' $MANIFEST

          sed -i '/<application/i\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>' $MANIFEST


      - name: Patch MainActivity (Clipboard + Back + Screenshot Lock)
        run: |

          MAIN=$(find android -name MainActivity.java | head -1)

          PKG=$(grep "^package" $MAIN)

          cat > $MAIN <<EOF
          $PKG

          import android.os.Bundle;
          import android.os.Handler;
          import android.view.WindowManager;
          import android.webkit.WebView;
          import android.widget.Toast;

          import android.content.ClipboardManager;
          import android.content.ClipData;
          import android.content.Context;
          import android.net.Uri;
          import android.content.Intent;

          import android.util.Base64;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;

          import java.io.InputStream;
          import java.io.ByteArrayOutputStream;

          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {

              private boolean doubleBackPressed = false;
              private static final int PICK_IMAGE = 9001;

              @Override
              public void onCreate(Bundle savedInstanceState) {

                  super.onCreate(savedInstanceState);

                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_SECURE,
                      WindowManager.LayoutParams.FLAG_SECURE
                  );

                  WebView webView = getBridge().getWebView();

                  webView.addJavascriptInterface(
                      new ClipboardInterface(),
                      "NativeClipboard"
                  );
              }

              @Override
              public void onBackPressed() {

                  WebView webView = getBridge().getWebView();

                  if(webView.canGoBack()){
                      webView.goBack();
                      return;
                  }

                  if(doubleBackPressed){
                      finishAffinity();
                      return;
                  }

                  doubleBackPressed = true;

                  Toast.makeText(
                      this,
                      "Press back again to exit",
                      Toast.LENGTH_SHORT
                  ).show();

                  new Handler().postDelayed(() -> {
                      doubleBackPressed = false;
                  },1500);
              }


              public class ClipboardInterface {

                  @android.webkit.JavascriptInterface
                  public String getClipboardImage(){

                      try{

                          ClipboardManager clipboard =
                              (ClipboardManager)getSystemService(Context.CLIPBOARD_SERVICE);

                          if(!clipboard.hasPrimaryClip())
                              return "";

                          ClipData clip = clipboard.getPrimaryClip();

                          if(clip==null || clip.getItemCount()==0)
                              return "";

                          Uri uri = clip.getItemAt(0).getUri();

                          if(uri==null)
                              return "";

                          InputStream stream =
                              getContentResolver().openInputStream(uri);

                          Bitmap bmp =
                              BitmapFactory.decodeStream(stream);

                          ByteArrayOutputStream output =
                              new ByteArrayOutputStream();

                          bmp.compress(Bitmap.CompressFormat.PNG,100,output);

                          return "data:image/png;base64," +
                              Base64.encodeToString(
                                  output.toByteArray(),
                                  Base64.NO_WRAP
                              );

                      }catch(Exception e){
                          return "";
                      }
                  }


                  @android.webkit.JavascriptInterface
                  public void pickClipboardFallback(){

                      Intent intent = new Intent(Intent.ACTION_PICK);

                      intent.setType("image/*");

                      startActivityForResult(intent,PICK_IMAGE);
                  }
              }


              @Override
              protected void onActivityResult(
                  int requestCode,
                  int resultCode,
                  Intent data
              ){

                  super.onActivityResult(requestCode,resultCode,data);

                  if(requestCode==PICK_IMAGE && data!=null){

                      try{

                          Uri uri=data.getData();

                          InputStream stream=
                              getContentResolver().openInputStream(uri);

                          Bitmap bmp=
                              BitmapFactory.decodeStream(stream);

                          ByteArrayOutputStream output=
                              new ByteArrayOutputStream();

                          bmp.compress(Bitmap.CompressFormat.PNG,100,output);

                          String base64=
                              Base64.encodeToString(
                                  output.toByteArray(),
                                  Base64.NO_WRAP
                              );

                          getBridge().getWebView().evaluateJavascript(
                              "window.onClipboardImage('data:image/png;base64,"+base64+"')",
                              null
                          );

                      }catch(Exception ignored){}
                  }
              }
          }
          EOF


      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Ultimate-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
