name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Set logo
        run: |
          for dir in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$dir
            cp www/logo.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
            cp www/logo.png android/app/src/main/res/mipmap-$dir/ic_launcher_round.png
          done
      - name: Remove default vector icons
        run: |
          find android/app/src/main/res -name "ic_launcher.xml" -delete
          find android/app/src/main/res -name "ic_launcher_round.xml" -delete
          find android/app/src/main/res -name "ic_launcher_background.xml" -delete
          find android/app/src/main/res -name "ic_launcher_foreground.xml" -delete
          rm -rf android/app/src/main/res/mipmap-anydpi-v26

      - name: Patch MainActivity
        run: |
          cat > android/app/src/main/java/ir/nexus/noxhub/MainActivity.java << 'EOF'
          package ir.nexus.noxhub;

          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebResourceError;
          import android.webkit.WebResourceRequest;
          import android.content.ClipboardManager;
          import android.view.WindowManager;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // اسکرین‌شات قفل
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_SECURE,
                      WindowManager.LayoutParams.FLAG_SECURE
                  );
              }

              @Override
              public void onBackPressed() {
                  WebView webView = getBridge().getWebView();
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  }
                  // بیرون نمیره
              }
          }
          EOF

      - name: Patch WebView for offline and clipboard
        run: |
          BRIDGE="android/capacitor-android/capacitor/src/main/java/com/getcapacitor/Bridge.java"
          # inject offline page via WebViewClient override in MainActivity
          cat >> android/app/src/main/java/ir/nexus/noxhub/MainActivity.java << 'EOF'
          EOF

      - name: Patch offline error page
        run: |
          cat > android/app/src/main/java/ir/nexus/noxhub/MainActivity.java << 'EOF'
          package ir.nexus.noxhub;

          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebResourceError;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebChromeClient;
          import android.view.WindowManager;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_SECURE,
                      WindowManager.LayoutParams.FLAG_SECURE
                  );

                  WebView webView = getBridge().getWebView();

                  webView.getSettings().setAllowContentAccess(true);
                  webView.getSettings().setAllowFileAccess(true);
                  webView.getSettings().setClipboardEnabled(true);

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onReceivedError(WebView view, WebResourceRequest request,
                                                  WebResourceError error) {
                          if (request.isForMainFrame()) {
                              view.loadUrl("file:///android_asset/public/offline.html");
                          }
                      }
                  });
              }

              @Override
              public void onBackPressed() {
                  WebView webView = getBridge().getWebView();
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  }
              }
          }
          EOF


      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Find APK
        run: find android -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
