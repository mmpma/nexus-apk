name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Set logo
        run: |
          for dir in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$dir
            cp www/logo.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
            cp www/logo.png android/app/src/main/res/mipmap-$dir/ic_launcher_round.png
          done

      - name: Remove default vector icons
        run: |
          find android/app/src/main/res -name "ic_launcher.xml" -delete
          find android/app/src/main/res -name "ic_launcher_round.xml" -delete
          find android/app/src/main/res -name "ic_launcher_background.xml" -delete
          find android/app/src/main/res -name "ic_launcher_foreground.xml" -delete
          rm -rf android/app/src/main/res/mipmap-anydpi-v26

      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # افزودن permission های کلیپبورد و storage قبل از تگ <application
          sed -i 's|<application|<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <application|' "$MANIFEST"

      - name: Patch MainActivity
        run: |
          mkdir -p android/app/src/main/java/ir/nexus/noxhub
          cat > android/app/src/main/java/ir/nexus/noxhub/MainActivity.java << 'EOF'
          package ir.nexus.noxhub;

          import android.os.Bundle;
          import android.webkit.JavascriptInterface;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceError;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.view.WindowManager;
          import android.widget.Toast;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {

              private long backPressedTime = 0;

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // قفل اسکرین‌شات
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_SECURE,
                      WindowManager.LayoutParams.FLAG_SECURE
                  );

                  WebView webView = getBridge().getWebView();
                  webView.getSettings().setAllowContentAccess(true);
                  webView.getSettings().setAllowFileAccess(true);

                  // JavaScript Interface برای دکمه Back
                  webView.addJavascriptInterface(new AndroidBridge(), "AndroidBridge");

                  // Permission کلیپبورد تصویر
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          request.grant(request.getResources());
                      }
                  });

                  // صفحه آفلاین
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onReceivedError(WebView view, WebResourceRequest request,
                                                  WebResourceError error) {
                          if (request.isForMainFrame()) {
                              view.loadUrl("file:///android_asset/public/offline.html");
                          }
                      }
                  });
              }

              // این متد فقط برای دکمه فیزیکی Back گوشی است
              // دکمه Back داخل UI از طریق AndroidBridge.goBack() کار می‌کند
              @Override
              public void onBackPressed() {
                  WebView webView = getBridge().getWebView();
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      if (System.currentTimeMillis() - backPressedTime < 2000) {
                          super.onBackPressed();
                      } else {
                          backPressedTime = System.currentTimeMillis();
                          Toast.makeText(this,
                              "برای خروج دوباره بزنید",
                              Toast.LENGTH_SHORT).show();
                      }
                  }
              }

              private class AndroidBridge {
                  @JavascriptInterface
                  public void goBack() {
                      runOnUiThread(() -> {
                          WebView webView = getBridge().getWebView();
                          if (webView != null && webView.canGoBack()) {
                              webView.goBack();
                          } else {
                              if (System.currentTimeMillis() - backPressedTime < 2000) {
                                  finish();
                              } else {
                                  backPressedTime = System.currentTimeMillis();
                                  Toast.makeText(MainActivity.this,
                                      "برای خروج دوباره بزنید",
                                      Toast.LENGTH_SHORT).show();
                              }
                          }
                      });
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Find APK
        run: find android -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-apk
          path: android/app/src/main/apk/debug/app-debug.apk
          retention-days: 30
